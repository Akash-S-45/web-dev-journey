<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html audio&video</title>
</head>
<body>
    <!--video tags-->
    <video width="200" controls poster="IMG_20240216_094859.jpg" allowfullscreen="">
        <source src="VID-20240215-WA0012.mp4" type="video/mp4">
    </video>

    <!--audio tags-->
    <audio controls>
        <source src="music.mp3" type="music/mp3">
    </audio>

    <!--iframe tags-->
    <!-- The <iframe> tag in HTML is used to embed another webpage, 
        document, video, map, or other content inside the current webpage -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/7mWd8fOG7qI?si=h8cSh0rBIf-UCpbN" 
    title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; 
    gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen title="Youtube video"></iframe>
    
    
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d214358.21555154154!2d76.950773547774!3d11.00808580299389!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba859af2f971cb5%3A0x2fc1c81e183ed282!2sCoimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1780071667448!5m2!1sen!2sin" 
    width="800" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Google maps"></iframe>
</body>
</html>
