<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html FORMS</title>
</head>
<body>
    <center>
    <header>
        <p>Model 1</p>
        <h1>Registration form</h1>
    </header>

    <main>
            <form action="">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
                <br>
                <label for="age">Age:</label>
                <input type="age" id="age" placeholder="Enter your age">
                <br>
                <label for="gender">Gender:</label>
                <input type="radio" id="gender">Male <input type="radio" id="gender">Female
                <br>
                <label for="course">Course:</label>
                <select name="" id="">
                    <option value="">Java</option>
                    <option value="">Python</option>
                    <option value="">Node js</option>
                    <option value="">JavaScript</option>
                </select>
                <br>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <br>
                <label for="contact">Contact:</label>
                <input type="number" id="number" placeholder="Enter your number">
                <br>
                <label for="message">Message:</label>
                <textarea rows="2" cols="10"></textarea>
                <br>
                <button type="button">Submit</button>
            </form>

    <p>Model 2</p>
            <form>
                <table>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Enter Your Name"></td>
                    </tr>
                    <tr>
                        <td>Age:</td>
                        <td><input type="number" placeholder="Enter Your Age"></td>
                    </tr>
                    <tr>
                        <td>Gender:</td>
                        <td><input type="radio" name="Gender">Male<input type="radio" name="Gender">Female</td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td><input type="email" placeholder="Enter Your Email" required></td>
                    </tr>
                    <tr>
                        <td>Select a course:</td> 
                        <td> 
                            <select>
                                <option>full stack</option>
                                <option>data science</option>
                                <option>python</option>
                            </select>
                        </td>

                    </tr>
                    <tr>
                        <td>upload your resume:</td>
                        <td><input type="file"></td>
                    </tr>
                    <tr>
                        <td>Contact:</td>
                        <td><input type="number" placeholder="Enter your number"></td>
                    </tr>
                    <tr>
                        <td>Message:</td>
                        <td><textarea rows="2" cols="20">Drop Your Thoughts!</textarea></td>
                    </tr>
                    <tr>
                        <td><input type="reset"></td> 
                        <td><input type="submit"></td>
                    </tr>
                </table>
            </form>
        </main>
    </center>
</body>
</html>
