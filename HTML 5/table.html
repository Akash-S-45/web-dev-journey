<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Table</title>
</head>
<body>
    <table border="1">
            <thead>

                <tr>
                    <th colspan="3">Student Details</th>
                </tr>

                <tr>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Age</th>
                </tr>
            </thead>

            <tbody>
            <tr>
                <td>Akash</td>
                <td rowspan="2">IT</td>
                <td>22</td> 
            </tr>

            <tr>
                <td>Rahul</td>
                <td>23</td>
            </tr>
            </tbody>

        </table>
</body>
</html>
